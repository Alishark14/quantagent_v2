# QuantAgent v2 — nginx reverse proxy
# Place in /etc/nginx/sites-available/quantagent
# ln -s /etc/nginx/sites-available/quantagent /etc/nginx/sites-enabled/

upstream quantagent {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS when SSL is configured
    # Uncomment the next 2 lines and comment out the location blocks below
    # return 301 https://$host$request_uri;
    # }
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # API endpoints
    location /v1/ {
        proxy_pass http://quantagent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — analysis cycles can take 30+ seconds
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket endpoint
    location /v1/ws {
        proxy_pass http://quantagent;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check (no auth, fast)
    location /v1/health {
        proxy_pass http://quantagent;
        proxy_read_timeout 5s;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Logging
    access_log /var/log/nginx/quantagent_access.log;
    error_log /var/log/nginx/quantagent_error.log;
}
