# QuantAgent v2 — Timeframe Profiles
# Base profiles modified by regime at runtime via get_dynamic_profile()

timeframe_profiles:
  15m:
    candles: 100
    atr_multiplier: 2.5
    rr_min: 0.8
    rr_max: 1.2
    trailing_enabled: false

  30m:
    candles: 100
    atr_multiplier: 2.0
    rr_min: 1.0
    rr_max: 1.5
    trailing_enabled: false

  1h:
    candles: 150
    atr_multiplier: 1.5
    rr_min: 1.5
    rr_max: 2.0
    trailing_enabled: false

  4h:
    candles: 150
    atr_multiplier: 1.0
    rr_min: 3.0
    rr_max: 5.0
    trailing_enabled: true

  1d:
    candles: 200
    atr_multiplier: 1.0
    rr_min: 3.0
    rr_max: 5.0
    trailing_enabled: true

# Regime multipliers (applied via get_dynamic_profile)
regime_multipliers:
  TRENDING:
    atr_mult: 0.8
    rr_min_mult: 1.3
    rr_max_mult: 1.5
  TRENDING_UP:
    atr_mult: 0.8
    rr_min_mult: 1.3
    rr_max_mult: 1.5
  TRENDING_DOWN:
    atr_mult: 0.8
    rr_min_mult: 1.3
    rr_max_mult: 1.5
  RANGING:
    atr_mult: 1.2
    rr_min_mult: 0.7
    rr_max_mult: 0.8
  HIGH_VOLATILITY:
    atr_mult: 1.3
    rr_min_mult: 0.8
    rr_max_mult: 1.0
  BREAKOUT:
    atr_mult: 0.9
    rr_min_mult: 1.5
    rr_max_mult: 2.0
