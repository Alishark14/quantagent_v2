name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Import violation check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No FastAPI imports in engine/
        run: |
          if grep -rn "from fastapi\|import fastapi" engine/; then
            echo "FAIL: engine/ must not import FastAPI"
            exit 1
          fi

      - name: No SQL in engine/
        run: |
          if grep -rn "import sqlite3\|import asyncpg\|import aiosqlite\|from sqlalchemy" engine/; then
            echo "FAIL: engine/ must not import database drivers"
            exit 1
          fi

      - name: No CCXT in engine/ (except data/ohlcv)
        run: |
          if grep -rn "import ccxt\|from ccxt" engine/ | grep -v "data/ohlcv"; then
            echo "FAIL: engine/ must not import ccxt directly (use exchange adapters)"
            exit 1
          fi

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ tests/api/ -v --tb=short

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short
